name: CI — Full Platform

# Master workflow: runs on every push/PR to main/develop.
# Individual service workflows also run independently when only their paths change.
# This workflow provides a single required status check for branch protection.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── Quick gate: TypeScript + unit tests ─────────────────────────────────
  node-bff:
    name: BFF (Node.js)
    uses: ./.github/workflows/ci-node.yml

  # ─── Go services ─────────────────────────────────────────────────────────
  go-services:
    name: Go Services
    uses: ./.github/workflows/ci-go.yml

  # ─── Rust services ────────────────────────────────────────────────────────
  rust-services:
    name: Rust Services
    uses: ./.github/workflows/ci-rust.yml

  # ─── Python services ──────────────────────────────────────────────────────
  python-services:
    name: Python Services
    uses: ./.github/workflows/ci-python.yml

  # ─── All-green gate ───────────────────────────────────────────────────────
  all-green:
    name: All CI Checks Passed
    runs-on: ubuntu-latest
    needs: [node-bff, go-services, rust-services, python-services]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.node-bff.result }}" != "success" ]]; then
            echo "❌ BFF checks failed"
            exit 1
          fi
          if [[ "${{ needs.go-services.result }}" != "success" ]]; then
            echo "❌ Go service checks failed"
            exit 1
          fi
          if [[ "${{ needs.rust-services.result }}" != "success" ]]; then
            echo "❌ Rust service checks failed"
            exit 1
          fi
          if [[ "${{ needs.python-services.result }}" != "success" ]]; then
            echo "❌ Python service checks failed"
            exit 1
          fi
          echo "✅ All CI checks passed"

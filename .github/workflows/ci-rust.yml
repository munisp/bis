name: CI — Rust Services

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/aml-engine/**'
      - 'services/event-emitter/**'
      - 'services/event-processor/**'
      - '.github/workflows/ci-rust.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/aml-engine/**'
      - 'services/event-emitter/**'
      - 'services/event-processor/**'
      - '.github/workflows/ci-rust.yml'

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  # ─── AML Engine ───────────────────────────────────────────────────────────
  aml-engine:
    name: AML Engine
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/aml-engine
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            services/aml-engine/target
          key: ${{ runner.os }}-cargo-aml-engine-${{ hashFiles('services/aml-engine/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-aml-engine-

      - name: Install system dependencies (librdkafka)
        run: sudo apt-get update && sudo apt-get install -y librdkafka-dev libsasl2-dev libssl-dev cmake

      - name: Check formatting
        run: cargo fmt --check
        continue-on-error: true

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        continue-on-error: true

      - name: Build
        run: cargo build --all-features

      - name: Test
        run: cargo test --all-features -- --test-threads=4

  # ─── Event Emitter ────────────────────────────────────────────────────────
  event-emitter:
    name: Event Emitter
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/event-emitter
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            services/event-emitter/target
          key: ${{ runner.os }}-cargo-event-emitter-${{ hashFiles('services/event-emitter/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-event-emitter-

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y librdkafka-dev libsasl2-dev libssl-dev cmake libcurl4-openssl-dev

      - name: Check formatting
        run: cargo fmt --check
        continue-on-error: true

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
        continue-on-error: true

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test -- --test-threads=4

  # ─── Event Processor ──────────────────────────────────────────────────────
  event-processor:
    name: Event Processor
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/event-processor
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            services/event-processor/target
          key: ${{ runner.os }}-cargo-event-processor-${{ hashFiles('services/event-processor/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-event-processor-

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y librdkafka-dev libsasl2-dev libssl-dev cmake

      - name: Check formatting
        run: cargo fmt --check
        continue-on-error: true

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        continue-on-error: true

      - name: Build
        run: cargo build --all-features

      - name: Test
        run: cargo test --all-features -- --test-threads=4

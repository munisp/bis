name: Load Tests (k6)

on:
  # Smoke test on every PR merge to main
  push:
    branches: [main]
    paths:
      - "server/**"
      - "k6/**"
  # Full load test nightly
  schedule:
    - cron: "0 2 * * *"  # 2 AM UTC daily
  # Manual trigger with configurable intensity
  workflow_dispatch:
    inputs:
      test_type:
        description: "Test type: smoke | load | stress"
        required: true
        default: "smoke"
        type: choice
        options:
          - smoke
          - load
          - stress
      base_url:
        description: "Target URL (default: staging)"
        required: false
        default: ""

env:
  K6_VERSION: "0.50.0"
  DEFAULT_BASE_URL: ${{ secrets.STAGING_URL || 'http://localhost:8080' }}

jobs:
  # ── Smoke test (fast, runs on every push) ─────────────────────────────────
  smoke-test:
    name: Smoke Test (10 VUs, 30s)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.test_type == 'smoke')

    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run smoke test
        env:
          BASE_URL: ${{ github.event.inputs.base_url || env.DEFAULT_BASE_URL }}
          API_TOKEN: ${{ secrets.LOAD_TEST_API_TOKEN }}
        run: |
          k6 run \
            --vus 10 \
            --duration 30s \
            --env BASE_URL=$BASE_URL \
            --env API_TOKEN=$API_TOKEN \
            k6/payment-load-test.js

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results-${{ github.sha }}
          path: k6-results/
          retention-days: 7

  # ── Full load test (nightly) ──────────────────────────────────────────────
  load-test:
    name: Full Load Test (1000 VUs, 5m)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.test_type == 'load')

    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run payment load test
        env:
          BASE_URL: ${{ secrets.STAGING_URL }}
          API_TOKEN: ${{ secrets.LOAD_TEST_API_TOKEN }}
        run: |
          mkdir -p k6-results
          k6 run \
            --out json=k6-results/payment-results.json \
            --env BASE_URL=$BASE_URL \
            --env API_TOKEN=$API_TOKEN \
            k6/payment-load-test.js

      - name: Run verification load test
        env:
          BASE_URL: ${{ secrets.STAGING_URL }}
          API_TOKEN: ${{ secrets.LOAD_TEST_API_TOKEN }}
        run: |
          k6 run \
            --out json=k6-results/verification-results.json \
            --env BASE_URL=$BASE_URL \
            --env API_TOKEN=$API_TOKEN \
            k6/verification-load-test.js

      - name: Parse and report SLO results
        run: |
          python3 - << 'EOF'
          import json, sys

          def check_slo(results_file, slos):
              try:
                  with open(results_file) as f:
                      # k6 JSON output is newline-delimited
                      metrics = {}
                      for line in f:
                          try:
                              obj = json.loads(line)
                              if obj.get("type") == "Point":
                                  name = obj["metric"]
                                  val = obj["data"]["value"]
                                  if name not in metrics:
                                      metrics[name] = []
                                  metrics[name].append(val)
                          except:
                              pass

                  passed = True
                  for metric, threshold, comparator in slos:
                      values = metrics.get(metric, [])
                      if not values:
                          print(f"  SKIP  {metric}: no data")
                          continue
                      values.sort()
                      p99 = values[int(len(values) * 0.99)]
                      p95 = values[int(len(values) * 0.95)]
                      p50 = values[int(len(values) * 0.50)]
                      check_val = {"p99": p99, "p95": p95, "p50": p50}.get(comparator, p99)
                      ok = check_val < threshold
                      status = "PASS" if ok else "FAIL"
                      if not ok:
                          passed = False
                      print(f"  {status}  {metric} {comparator}={check_val:.1f}ms (threshold: <{threshold}ms)")
                  return passed
              except FileNotFoundError:
                  print(f"  SKIP  {results_file}: not found")
                  return True

          print("\n=== Payment API SLOs ===")
          payment_slos = [
              ("payment_latency_ms", 500, "p99"),
              ("payment_latency_ms", 200, "p95"),
              ("payment_latency_ms", 50,  "p50"),
          ]
          p1 = check_slo("k6-results/payment-results.json", payment_slos)

          print("\n=== Verification API SLOs ===")
          verify_slos = [
              ("verification_latency_ms", 50,   "p95"),
              ("verification_latency_ms", 2000, "p95"),
          ]
          p2 = check_slo("k6-results/verification-results.json", verify_slos)

          if not (p1 and p2):
              print("\n❌ SLO violations detected!")
              sys.exit(1)
          else:
              print("\n✅ All SLOs passed!")
          EOF

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results-${{ github.run_id }}
          path: k6-results/
          retention-days: 30

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🚨 BIS Load Test FAILED\nBranch: ${{ github.ref_name }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # ── Stress test (manual only) ─────────────────────────────────────────────
  stress-test:
    name: Stress Test (find breaking point)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.test_type == 'stress'

    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run stress test (ramp to 5000 VUs)
        env:
          BASE_URL: ${{ github.event.inputs.base_url || secrets.STAGING_URL }}
          API_TOKEN: ${{ secrets.LOAD_TEST_API_TOKEN }}
        run: |
          k6 run \
            --vus 5000 \
            --duration 10m \
            --env BASE_URL=$BASE_URL \
            --env API_TOKEN=$API_TOKEN \
            k6/payment-load-test.js || true  # Don't fail CI on stress test

      - name: Upload stress results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stress-test-results-${{ github.run_id }}
          path: k6-results/
          retention-days: 90

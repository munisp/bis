name: BIS Platform CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'client/**'
      - 'server/**'
      - 'drizzle/**'
      - 'shared/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig*.json'
      - 'vite.config.ts'
      - 'vitest.config.ts'
      - '.github/workflows/ci-node.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'client/**'
      - 'server/**'
      - 'drizzle/**'
      - 'shared/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig*.json'
      - 'vite.config.ts'
      - 'vitest.config.ts'
      - '.github/workflows/ci-node.yml'

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bis_user
          POSTGRES_PASSWORD: bis_secure_2026
          POSTGRES_DB: bis_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U bis_user -d bis_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://bis_user:bis_secure_2026@localhost:5432/bis_db
      JWT_SECRET: ci-test-jwt-secret-not-for-prod
      VITE_APP_ID: ci-test-app-id
      OAUTH_SERVER_URL: https://api.manus.im
      VITE_OAUTH_PORTAL_URL: https://manus.im/oauth
      OWNER_OPEN_ID: ci-test-owner
      OWNER_NAME: CI Test Owner
      BUILT_IN_FORGE_API_URL: https://api.manus.im
      BUILT_IN_FORGE_API_KEY: ci-test-forge-key
      VITE_FRONTEND_FORGE_API_KEY: ci-test-frontend-forge-key
      VITE_FRONTEND_FORGE_API_URL: https://api.manus.im

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm exec tsc --noEmit

      - name: Push DB schema
        run: pnpm db:push

      - name: Seed test data
        run: pnpm db:seed
        env:
          DATABASE_URL: postgresql://bis_user:bis_secure_2026@localhost:5432/bis_db

      - name: Run Vitest
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: bis-pwa-dist
          path: dist/
          retention-days: 7

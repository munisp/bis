name: CI — Python Services

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/biometric-engine/**'
      - 'services/lakehouse-writer/**'
      - 'services/lex-validator/**'
      - 'services/ml-enrichment/**'
      - 'services/risk-engine/**'
      - 'services/risk-scoring/**'
      - '.github/workflows/ci-python.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/biometric-engine/**'
      - 'services/lakehouse-writer/**'
      - 'services/lex-validator/**'
      - 'services/ml-enrichment/**'
      - 'services/risk-engine/**'
      - 'services/risk-scoring/**'
      - '.github/workflows/ci-python.yml'

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ─── Biometric Engine ─────────────────────────────────────────────────────
  biometric-engine:
    name: Biometric Engine
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/biometric-engine
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: services/biometric-engine/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Lint with ruff
        run: pip install ruff && ruff check .
        continue-on-error: true

      - name: Test
        run: pytest -v --tb=short --timeout=60

  # ─── Lakehouse Writer ─────────────────────────────────────────────────────
  lakehouse-writer:
    name: Lakehouse Writer
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/lakehouse-writer
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: services/lakehouse-writer/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Lint with ruff
        run: pip install ruff && ruff check .
        continue-on-error: true

      - name: Test
        run: pytest -v --tb=short --timeout=60

  # ─── LEX Validator (stdlib only — no requirements.txt) ───────────────────
  lex-validator:
    name: LEX Validator
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/lex-validator
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install test runner
        run: pip install pytest pytest-cov

      - name: Lint with ruff
        run: pip install ruff && ruff check .
        continue-on-error: true

      - name: Test
        run: pytest -v --tb=short --timeout=60

  # ─── ML Enrichment ────────────────────────────────────────────────────────
  ml-enrichment:
    name: ML Enrichment
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ml-enrichment
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: services/ml-enrichment/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Lint with ruff
        run: pip install ruff && ruff check .
        continue-on-error: true

      - name: Test
        run: pytest -v --tb=short --timeout=120

  # ─── Risk Engine ──────────────────────────────────────────────────────────
  risk-engine:
    name: Risk Engine
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/risk-engine
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: services/risk-engine/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Lint with ruff
        run: pip install ruff && ruff check .
        continue-on-error: true

      - name: Test
        run: pytest -v --tb=short --timeout=60

  # ─── Risk Scoring ─────────────────────────────────────────────────────────
  risk-scoring:
    name: Risk Scoring
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/risk-scoring
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: services/risk-scoring/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Lint with ruff
        run: pip install ruff && ruff check .
        continue-on-error: true

      - name: Test
        run: pytest -v --tb=short --timeout=60

name: Docker Build

# Builds and pushes Docker images for all services on main branch merges.
# Images are tagged with the commit SHA and 'latest'.
# Requires secrets: DOCKER_USERNAME, DOCKER_PASSWORD (or GHCR token).

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/bis

jobs:
  build-images:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # Go services
          - service: gateway
            context: services/gateway
            image: bis-gateway
          - service: case-manager
            context: services/case-manager
            image: bis-case-manager
          - service: lex-intake
            context: services/lex-intake
            image: bis-lex-intake
          - service: ollama-adapter
            context: services/ollama-adapter
            image: bis-ollama-adapter
          - service: payment-rails
            context: services/payment-rails
            image: bis-payment-rails
          # Rust services
          - service: aml-engine
            context: services/aml-engine
            image: bis-aml-engine
          - service: event-emitter
            context: services/event-emitter
            image: bis-event-emitter
          - service: event-processor
            context: services/event-processor
            image: bis-event-processor
          # Python services
          - service: biometric-engine
            context: services/biometric-engine
            image: bis-biometric-engine
          - service: lakehouse-writer
            context: services/lakehouse-writer
            image: bis-lakehouse-writer
          - service: lex-validator
            context: services/lex-validator
            image: bis-lex-validator
          - service: ml-enrichment
            context: services/ml-enrichment
            image: bis-ml-enrichment
          - service: risk-engine
            context: services/risk-engine
            image: bis-risk-engine
          - service: risk-scoring
            context: services/risk-scoring
            image: bis-risk-scoring
          # Node.js BFF
          - service: bff
            context: .
            image: bis-bff

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

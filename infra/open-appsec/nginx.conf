## ─── nginx.conf for open-appsec WAF (BIS Platform) ──────────────────────────
## open-appsec runs as an nginx module. This config places it in front of APISIX.
## Traffic flow: Internet → open-appsec:80/443 → APISIX:9080 → BIS Services

worker_processes auto;
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # ─── Basic Settings ───────────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # ─── Security Headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ─── Gzip Compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml+rss application/atom+xml image/svg+xml;

    # ─── Rate Limiting Zones ──────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=global:10m rate=200r/m;
    limit_req_zone $binary_remote_addr zone=auth:1m rate=20r/m;
    limit_req_zone $binary_remote_addr zone=lex_submit:1m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api_v1:5m rate=60r/m;
    limit_req_status 429;

    # ─── open-appsec Module ───────────────────────────────────────────────────
    # The open-appsec nginx module is loaded via the Docker image
    # open-appsec/open-appsec-nginx:latest which pre-loads the module.
    # Policy is loaded from /etc/cp/conf/open-appsec.yaml

    # ─── Upstream: APISIX Gateway ─────────────────────────────────────────────
    upstream apisix_backend {
        server apisix:9080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ─── HTTP → HTTPS Redirect ────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Health check endpoint (no redirect for load balancer probes)
        location /health {
            access_log off;
            return 200 '{"status":"ok","service":"open-appsec-waf"}';
            add_header Content-Type application/json;
        }

        # open-appsec metrics endpoint
        location /open-appsec-metrics {
            access_log off;
            # Restrict to internal network only
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            allow 127.0.0.1;
            deny all;
            # Served by open-appsec module
            return 200 '{"status":"metrics-endpoint"}';
            add_header Content-Type application/json;
        }

        # In production, redirect all HTTP to HTTPS
        # Uncomment when TLS is configured:
        # return 301 https://$host$request_uri;

        # For development/internal: proxy directly to APISIX
        location / {
            limit_req zone=global burst=50 nodelay;

            proxy_pass http://apisix_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-BIS-WAF-Protected "open-appsec";

            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }

        # Auth endpoints — stricter rate limiting
        location ~ ^/api/(oauth|trpc/auth) {
            limit_req zone=auth burst=5 nodelay;

            proxy_pass http://apisix_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # LEX public submission — strictest rate limiting
        location = /api/trpc/lex.submitIncident {
            limit_req zone=lex_submit burst=3 nodelay;

            proxy_pass http://apisix_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API v1 external endpoints
        location /api/v1/ {
            limit_req zone=api_v1 burst=20 nodelay;

            proxy_pass http://apisix_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ─── HTTPS Server (uncomment when TLS certificates are available) ─────────
    # server {
    #     listen 443 ssl http2;
    #     server_name bis.example.com;
    #
    #     ssl_certificate /etc/nginx/ssl/bis.crt;
    #     ssl_certificate_key /etc/nginx/ssl/bis.key;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:...;
    #     ssl_prefer_server_ciphers off;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 1d;
    #     ssl_session_tickets off;
    #     ssl_stapling on;
    #     ssl_stapling_verify on;
    #
    #     location / {
    #         proxy_pass http://apisix_backend;
    #         # ... same proxy settings as HTTP block
    #     }
    # }
}

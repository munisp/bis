apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: bis-secretstore
  namespace: default
spec:
  # Local environment variable secret store — reads secrets from the process env.
  # In Kubernetes, replace with secretstores.kubernetes or secretstores.azure.keyvault.
  type: secretstores.local.env
  version: v1
  metadata: []
scopes:
  - bis-bff
  - bis-gateway
  - bis-aml-engine
  - bis-risk-engine
  - bis-biometric-engine

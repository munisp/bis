# ─── BIS Dapr Subscriptions — Extended (P0–P2 gap closure) ──────────────────
# These subscriptions wire the new domain events introduced in the P0–P4
# implementation to the correct consumer services.
#
# Topic naming convention: bis.{domain}.{event_type}
# All topics use the bis-pubsub component (Redis Streams).

# ── Criminal Records ──────────────────────────────────────────────────────────

apiVersion: dapr.io/v2alpha1
kind: Subscription
metadata:
  name: criminal-record-request-submitted
  namespace: default
spec:
  pubsubname: bis-pubsub
  topic: bis.criminal_records.request_submitted
  routes:
    default: /dapr/subscribe/criminal-records/request-submitted
  scopes:
    - bis-bff
    - bis-risk-engine
    - bis-gateway
---
apiVersion: dapr.io/v2alpha1
kind: Subscription
metadata:
  name: criminal-record-ingested
  namespace: default
spec:
  pubsubname: bis-pubsub
  topic: bis.criminal_records.record_ingested
  routes:
    default: /dapr/subscribe/criminal-records/record-ingested
  scopes:
    - bis-bff
    - bis-risk-engine
    - bis-aml-engine
---
apiVersion: dapr.io/v2alpha1
kind: Subscription
metadata:
  name: criminal-record-warrant-detected
  namespace: default
spec:
  pubsubname: bis-pubsub
  topic: bis.criminal_records.warrant_detected
  routes:
    default: /dapr/subscribe/criminal-records/warrant-detected
  # Warrant alerts go to all consumer services for immediate action
  scopes:
    - bis-bff
    - bis-risk-engine
    - bis-aml-engine
    - bis-gateway
---
apiVersion: dapr.io/v2alpha1
kind: Subscription
metadata:
  name: criminal-record-verified
  namespace: default
spec:
  pubsubname: bis-pubsub
  topic: bis.criminal_records.record_verified
  routes:
    default: /dapr/subscribe/criminal-records/record-verified
  scopes:
    - bis-bff
    - bis-risk-engine


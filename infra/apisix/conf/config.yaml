# ─── APISix Configuration for BIS Platform ───────────────────────────────────
# Single ingress point in front of all 4 BIS application services.
# Plugins: jwt-auth, rate-limit, request-id, prometheus, cors, response-rewrite

apisix:
  node_listen: 9080          # HTTP ingress port
  enable_admin: true
  admin_listen:
    ip: 0.0.0.0
    port: 9180
  enable_dev_mode: false
  enable_reuseport: true
  show_upstream_status_in_response_header: false
  enable_ipv6: false
  extra_lua_path: ""
  extra_lua_cpath: ""

deployment:
  role: traditional
  role_traditional:
    config_provider: yaml
  admin:
    allow_admin:
      - 127.0.0.0/24
      - 0.0.0.0/0   # restrict in production
    admin_key:
      - name: "admin"
        key: "${APISIX_ADMIN_KEY}"
        role: admin
      - name: "viewer"
        key: "${APISIX_VIEWER_KEY}"
        role: viewer
    admin_key_required: true

plugin_attr:
  # ─── open-appsec WAF Header Validation (Defense-in-Depth) ───────────────────
  # Validates that all requests passed through the open-appsec WAF nginx proxy.
  # The X-BIS-WAF-Protected: open-appsec header is injected by nginx.conf.
  # In OPEN_APPSEC_MODE=prevent, requests that bypass the WAF are logged.
  serverless-pre-function:
    phase: rewrite
    functions:
      - |
        local env_mode = os.getenv("OPEN_APPSEC_MODE") or "detect"
        if env_mode == "prevent" then
          local waf_hdr = ngx.req.get_headers()["x-bis-waf-protected"]
          if not waf_hdr then
            ngx.log(ngx.WARN, "[BIS-WAF] Request bypassed open-appsec WAF: ",
              ngx.var.remote_addr, " ", ngx.var.request_uri)
          end
        end

  prometheus:
    export_uri: /apisix/prometheus/metrics
    export_addr:
      ip: 0.0.0.0
      port: 9091
    # Expose all upstream metrics for Grafana scraping
    enable_export_server: true
    metric_prefix: apisix_
  request-id:
    header_name: X-BIS-Request-ID
    include_in_response: true
    algorithm: uuid
  kafka-logger:
    # Global Kafka logger defaults — overridden per-route as needed
    timeout: 3
    broker_list:
      "kafka:9092": 1
    kafka_topic: bis.audit
    meta_format: default
    batch_max_size: 200
    inactive_timeout: 5
    buffer_duration: 60
    max_retry_count: 3
    retry_delay: 1
    include_req_body: false
    include_resp_body: false

plugins:
  - real-ip
  - client-control
  - proxy-control
  - request-id
  - zipkin
  - ext-plugin-pre-req
  - fault-injection
  - mocking
  - serverless-pre-function
  - cors
  - ip-restriction
  - ua-restriction
  - referer-restriction
  - csrf
  - uri-blocker
  - request-validation
  - openid-connect
  - authz-keycloak
  - wolf-rbac
  - ldap-auth
  - hmac-auth
  - basic-auth
  - jwt-auth
  - key-auth
  - consumer-restriction
  - forward-auth
  - opa
  - authz-casbin

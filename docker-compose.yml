version: "3.9"

# ─── BIS Platform — Full Stack Docker Compose ────────────────────────────────
# Infrastructure:  postgres, redis, zookeeper, kafka, keycloak, temporal, temporal-ui
#                  permify, apisix, tigerbeetle (init + server + http-proxy)
# Observability:   prometheus, grafana
# Application:     gateway (Go), risk-engine (Python), event-processor (Rust), bff (Node.js)
#
# Quick start:
#   cp .env.example .env && docker compose up -d
#   docker compose logs -f gateway risk-engine event-processor bff
#
# Service count: 18 containers total
# Ports:
#   3001  BFF (Node.js tRPC)
#   8081  Go Gateway
#   8082  Python Risk Engine
#   8083  Rust Event Processor
#   9080  APISix HTTP ingress
#   9091  APISix Prometheus metrics
#   9090  Prometheus
#   3000  Grafana
#   8085  Lakehouse Writer (Delta Lake + DuckDB)

networks:
  bis-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  keycloak_data:
  permify_data:
  tigerbeetle_data:
  apisix_data:
  open_appsec_data:   # open-appsec ML models and attack signatures
  open_appsec_logs:   # open-appsec nginx access/error logs
  prometheus_data:
  grafana_data:
  influxdb_data:
  lakehouse_data:
  ollama_data:

# ── Infrastructure ───────────────────────────────────────────────────────────

services:

  postgres:
    image: postgres:16-alpine
    container_name: bis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bis
      POSTGRES_USER: bis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bis_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks: [bis-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bis -d bis"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bis-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-bis_redis_dev}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks: [bis-net]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-bis_redis_dev}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: bis-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks: [bis-net]
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: bis-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_CREATE_TOPICS: "bis.events:3:1,bis.alerts:3:1,bis.audit:1:1,bis.billing:1:1"
    ports:
      - "9093:9093"
    networks: [bis-net]
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: bis-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/bis
      KC_DB_USERNAME: bis
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-bis_dev_password}
      KC_DB_SCHEMA: keycloak
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin_dev_password}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-localhost}
      KC_HOSTNAME_PORT: 8080
      KC_HTTP_ENABLED: "true"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./infra/keycloak/bis-realm.json:/opt/keycloak/data/import/bis-realm.json:ro
    ports:
      - "8080:8080"
    networks: [bis-net]
    depends_on:
      postgres:
        condition: service_healthy

  temporal:
    image: temporalio/auto-setup:1.24.2
    container_name: bis-temporal
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: bis
      POSTGRES_PWD: ${POSTGRES_PASSWORD:-bis_dev_password}
      POSTGRES_SEEDS: postgres
    ports:
      - "7233:7233"
    networks: [bis-net]

  temporal-ui:
    image: temporalio/ui:2.26.2
    container_name: bis-temporal-ui
    restart: unless-stopped
    depends_on: [temporal]
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8088:8080"
    networks: [bis-net]

  # ─── Permify — Fine-grained Authorization ─────────────────────────────────────
  permify:
    image: ghcr.io/permify/permify:latest
    container_name: bis-permify
    restart: unless-stopped
    command: serve
    environment:
      PERMIFY_DATABASE_ENGINE: postgres
      PERMIFY_DATABASE_URI: postgres://bis:${POSTGRES_PASSWORD:-bis_dev_password}@postgres:5432/bis?sslmode=disable
      PERMIFY_DATABASE_MAX_OPEN_CONNECTIONS: "20"
      PERMIFY_SERVER_PORT: "3476"
      PERMIFY_SERVER_GRPC_PORT: "3478"
      PERMIFY_LOG_LEVEL: info
      PERMIFY_AUTHN_ENABLED: "true"
      PERMIFY_AUTHN_METHOD: preshared
      PERMIFY_AUTHN_PRESHARED_KEYS: "${PERMIFY_API_KEY:-bis-permify-dev-key}"
    ports:
      - "3476:3476"   # HTTP API
      - "3478:3478"   # gRPC
    networks: [bis-net]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - permify_data:/var/lib/permify
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3476/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── open-appsec WAF — ML-based WAF in front of APISIX ──────────────────────────
  # open-appsec is an open-source ML-based WAF from Check Point.
  # It provides OWASP Top 10 protection, zero-day detection, and API schema validation.
  # Traffic flow: Internet → open-appsec:80 → APISIX:9080 → BIS Services
  # To enable: docker compose -f docker-compose.yml -f infra/open-appsec/docker-compose.override.yml up -d
  # Docs: https://docs.openappsec.io
  open-appsec:
    image: openappsec/open-appsec-nginx:latest
    container_name: bis-open-appsec
    restart: unless-stopped
    ports:
      - "80:80"         # HTTP ingress (public WAF endpoint)
      - "443:443"       # HTTPS ingress (when TLS is configured)
      - "8090:8080"     # open-appsec management/metrics
    volumes:
      - ./infra/open-appsec/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/open-appsec/open-appsec.yaml:/etc/cp/conf/open-appsec.yaml:ro
      - ./infra/open-appsec/local_policy.yaml:/etc/cp/conf/local_policy.yaml:ro
      - ./openapi.yaml:/etc/cp/conf/assets/openapi.yaml:ro
      - open_appsec_data:/etc/cp/data
      - open_appsec_logs:/var/log/nginx
    environment:
      OPEN_APPSEC_TOKEN: ${OPEN_APPSEC_TOKEN:-}   # Optional: cloud management token
      OPEN_APPSEC_MODE: ${OPEN_APPSEC_MODE:-prevent}
    networks: [bis-net]
    depends_on:
      apisix:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    profiles: [waf]   # Only starts with: docker compose --profile waf up -d

  # ─── APISix — API Gateway / Single Ingress ────────────────────────────────────
  apisix:
    image: apache/apisix:3.9.0-debian
    container_name: bis-apisix
    restart: unless-stopped
    volumes:
      - ./infra/apisix/conf/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./infra/apisix/conf/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
      - apisix_data:/usr/local/apisix/logs
    environment:
      APISIX_ADMIN_KEY: ${APISIX_ADMIN_KEY:-bis-apisix-admin-dev}
      APISIX_VIEWER_KEY: ${APISIX_VIEWER_KEY:-bis-apisix-viewer-dev}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    ports:
      - "9080:9080"   # HTTP ingress (public)
      - "9180:9180"   # Admin API (internal)
      - "9091:9091"   # Prometheus metrics
    networks: [bis-net]
    depends_on:
      - bff
      - gateway
      - risk-engine
      - event-processor
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9080/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── TigerBeetle — Immutable Financial Ledger ─────────────────────────────────
  # TigerBeetle requires a pre-formatted data file. The init container creates it.
  tigerbeetle-init:
    image: ghcr.io/tigerbeetle/tigerbeetle:0.16.11
    container_name: bis-tigerbeetle-init
    command: format --cluster=0 --replica=0 --replica-count=1 /data/0_0.tigerbeetle
    volumes:
      - tigerbeetle_data:/data
    networks: [bis-net]
    restart: "no"

  tigerbeetle:
    image: ghcr.io/tigerbeetle/tigerbeetle:0.16.11
    container_name: bis-tigerbeetle
    restart: unless-stopped
    command: start --addresses=0.0.0.0:3000 /data/0_0.tigerbeetle
    volumes:
      - tigerbeetle_data:/data
    ports:
      - "3100:3000"   # TigerBeetle binary protocol (mapped to 3100 to avoid BFF conflict)
    networks: [bis-net]
    depends_on:
      - tigerbeetle-init
    healthcheck:
      test: ["CMD-SHELL", "echo '{}' | nc -w1 localhost 3000 || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── TigerBeetle HTTP Proxy ────────────────────────────────────────────────────
  # Exposes TigerBeetle's binary protocol as a JSON REST API for Go/Node.js clients.
  tigerbeetle-http:
    image: ghcr.io/tigerbeetle/tigerbeetle-http:latest
    container_name: bis-tigerbeetle-http
    restart: unless-stopped
    environment:
      TIGERBEETLE_ADDRESS: tigerbeetle:3000
      PORT: "4000"
    ports:
      - "4000:4000"
    networks: [bis-net]
    depends_on:
      - tigerbeetle
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

# ─── Application Services ─────────────────────────────────────────────────────

  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    container_name: bis-gateway
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      GATEWAY_PORT: "8081"
      BIS_GATEWAY_KEY: ${BIS_GATEWAY_KEY:-dev-gateway-key-change-in-prod}
      KAFKA_BROKERS: kafka:9092
      REDIS_URL: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-bis_redis_dev}
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-bis}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-bis-gateway}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
      TEMPORAL_HOST: temporal:7233
      NIMC_API_URL: ${NIMC_API_URL:-https://api.nimc.gov.ng}
      NIMC_API_KEY: ${NIMC_API_KEY:-}
      BVN_API_URL: ${BVN_API_URL:-https://api.nibss-plc.org.ng}
      BVN_API_KEY: ${BVN_API_KEY:-}
      CAC_API_URL: ${CAC_API_URL:-https://api.cac.gov.ng}
      CAC_API_KEY: ${CAC_API_KEY:-}
      EFCC_API_URL: ${EFCC_API_URL:-https://api.efcc.gov.ng}
      CREDITBUREAU_API_KEY: ${CREDITBUREAU_API_KEY:-}
      # Permify
      PERMIFY_URL: http://permify:3476
      PERMIFY_TENANT_ID: ${PERMIFY_TENANT_ID:-t1}
      PERMIFY_API_KEY: ${PERMIFY_API_KEY:-bis-permify-dev-key}
      # TigerBeetle
      TIGERBEETLE_URL: http://tigerbeetle-http:4000
    ports:
      - "8081:8081"
    networks: [bis-net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  risk-engine:
    build:
      context: ./services/risk-engine
      dockerfile: Dockerfile
    container_name: bis-risk-engine
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      RISK_ENGINE_PORT: "8082"
      BIS_GATEWAY_KEY: ${BIS_GATEWAY_KEY:-dev-gateway-key-change-in-prod}
      KAFKA_BROKERS: kafka:9092
      REDIS_URL: redis://redis:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD:-bis_redis_dev}
      RISK_SCORE_TTL_SECONDS: "3600"
      LOOKUP_TTL_SECONDS: "86400"
      # Permify (read-only checks for risk scoring access)
      PERMIFY_URL: http://permify:3476
      PERMIFY_TENANT_ID: ${PERMIFY_TENANT_ID:-t1}
      PERMIFY_API_KEY: ${PERMIFY_API_KEY:-bis-permify-dev-key}
    ports:
      - "8082:8082"
    networks: [bis-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  event-processor:
    build:
      context: ./services/event-processor
      dockerfile: Dockerfile
    container_name: bis-event-processor
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      EVENT_PROCESSOR_PORT: "8083"
      BIS_GATEWAY_KEY: ${BIS_GATEWAY_KEY:-dev-gateway-key-change-in-prod}
      KAFKA_BROKERS: kafka:9092
    ports:
      - "8083:8083"
    networks: [bis-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  biometric-engine:
    build:
      context: ./services/biometric-engine
      dockerfile: Dockerfile
    container_name: bis-biometric-engine
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      PORT: "8084"
      REDIS_URL: redis://:${REDIS_PASSWORD:-bis_redis_dev}@redis:6379/2
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LIVENESS_THRESHOLD: "0.72"
      MATCH_THRESHOLD: "0.40"
      ANTISPOOFING_THRESHOLD: "0.60"
      EMBEDDING_CACHE_TTL: "86400"
    ports:
      - "8084:8084"
    networks: [bis-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  bff:
    build:
      context: .
      dockerfile: Dockerfile.bff
    container_name: bis-bff
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      gateway:
        condition: service_healthy
      risk-engine:
        condition: service_healthy
      event-processor:
        condition: service_healthy
      biometric-engine:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://bis:${POSTGRES_PASSWORD:-bis_dev_password}@postgres:5432/bis
      REDIS_URL: redis://:${REDIS_PASSWORD:-bis_redis_dev}@redis:6379
      GATEWAY_URL: http://gateway:8081
      RISK_ENGINE_URL: http://risk-engine:8082
      EVENT_PROCESSOR_URL: http://event-processor:8083
      TEMPORAL_HOST: temporal:7233
      BIS_GATEWAY_KEY: ${BIS_GATEWAY_KEY:-dev-gateway-key-change-in-prod}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-bis}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-bis-bff}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
      # Permify
      PERMIFY_URL: http://permify:3476
      PERMIFY_TENANT_ID: ${PERMIFY_TENANT_ID:-t1}
      PERMIFY_API_KEY: ${PERMIFY_API_KEY:-bis-permify-dev-key}
      # TigerBeetle
      TIGERBEETLE_URL: http://tigerbeetle-http:4000
      # Manus OAuth
      VITE_APP_ID: ${VITE_APP_ID:-}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL:-}
      VITE_OAUTH_PORTAL_URL: ${VITE_OAUTH_PORTAL_URL:-}
      BUILT_IN_FORGE_API_URL: ${BUILT_IN_FORGE_API_URL:-}
      BUILT_IN_FORGE_API_KEY: ${BUILT_IN_FORGE_API_KEY:-}
    ports:
      - "3001:3000"   # BFF internal port (APISix routes to this)
    networks: [bis-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/trpc/auth.me"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Observability: Prometheus ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: bis-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks: [bis-net]
    depends_on:
      - apisix
      - gateway
      - risk-engine
      - event-processor
      - bff
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Observability: Grafana ───────────────────────────────────────────────────

  # ─── Observability: InfluxDB 1.8 (k6 metrics sink) ──────────────────────────
  # k6 writes results via: k6 run --out influxdb=http://influxdb:8086/k6 script.js
  # Grafana reads from InfluxDB using the provisioned datasource.
  influxdb:
    image: influxdb:1.8-alpine
    container_name: bis-influxdb
    restart: unless-stopped
    environment:
      INFLUXDB_DB: k6
      INFLUXDB_HTTP_AUTH_ENABLED: "false"
      INFLUXDB_ADMIN_USER: admin
      INFLUXDB_ADMIN_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD:-bis_influx_dev}
    volumes:
      - influxdb_data:/var/lib/influxdb
    ports:
      - "8086:8086"
    networks: [bis-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:10.4.2
    container_name: bis-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-bis_grafana_dev}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3000
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/apisix-gateway.json
      GF_FEATURE_TOGGLES_ENABLE: "publicDashboards"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks: [bis-net]
    depends_on:
      - prometheus
      - influxdb
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Lakehouse Writer (Delta Lake + DuckDB) ──────────────────────────────────
  lakehouse-writer:
    build:
      context: ./services/lakehouse-writer
      dockerfile: Dockerfile
    container_name: bis-lakehouse-writer
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      LAKEHOUSE_PORT: "8085"
      LAKEHOUSE_BASE_PATH: /data/lakehouse
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPICS: bis.investigations,bis.alerts,bis.kyc
      LOG_LEVEL: INFO
    volumes:
      - lakehouse_data:/data/lakehouse
    ports:
      - "8085:8085"
    networks: [bis-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Ollama Local LLM ────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: bis-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
      # Mount the auto-pull entrypoint script into the container
      - ./services/ollama-adapter/scripts/ollama-entrypoint.sh:/usr/local/bin/ollama-entrypoint.sh:ro
    ports:
      - "11434:11434"
    networks: [bis-net]
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
      OLLAMA_DEFAULT_MODEL: ${OLLAMA_DEFAULT_MODEL:-llama3.2}
      # Comma-separated list of models to pull on first boot
      OLLAMA_MODELS: ${OLLAMA_MODELS:-llama3.2,nomic-embed-text}
      # Set SKIP_PULL=true in CI or when models are already cached
      SKIP_PULL: ${SKIP_PULL:-false}
    # Override the default entrypoint to use our auto-pull script
    entrypoint: ["/bin/bash", "/usr/local/bin/ollama-entrypoint.sh"]
    # Optional: GPU passthrough for NVIDIA (uncomment if GPU is available)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s  # Allow extra time for model pulls on first boot

  # ─── Ollama Adapter (Go) ─────────────────────────────────────────────────────
  ollama-adapter:
    build:
      context: ./services/ollama-adapter
      dockerfile: Dockerfile
    container_name: bis-ollama-adapter
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      PORT: "8090"
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_DEFAULT_MODEL: ${OLLAMA_DEFAULT_MODEL:-llama3.2}
      BIS_API_KEY: ${OLLAMA_ADAPTER_API_KEY:-bis_ollama_dev_key}
      ML_ENRICHMENT_URL: http://ml-enrichment:8091
      LOG_LEVEL: INFO
    ports:
      - "8090:8090"
    networks: [bis-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 15s
      timeout: 5s
      retries: 3

